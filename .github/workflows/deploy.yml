name: Deploy Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-worker-prod
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Generate wrangler.toml
        run: |
          cp wrangler.example.toml wrangler.toml
          sed -i "s/__KV_NAMESPACE_ID__/${CLOUDFLARE_KV_NAMESPACE_ID}/g" wrangler.toml
        env:
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}

      - name: Guard runtime secrets
        run: |
          if grep -Eq '^\[vars\]|DASHBOARD_ACCESS_TOKEN|CLIENT_SECRET|TUYA_CLIENT_SECRET|TELEGRAM_BOT_TOKEN' wrangler.toml; then
            echo "wrangler.toml must not define runtime variables or secrets. Configure them in Cloudflare Workers settings/secrets instead."
            exit 1
          fi

      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
